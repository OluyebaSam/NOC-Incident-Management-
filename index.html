<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Comium NOC - Login Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #1a1a2e;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #b91c1c;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔴 Comium NOC</h1>
        <p>Login Test</p>
        <input type="text" id="email" placeholder="Email" value="admin@comium.com">
        <input type="password" id="password" placeholder="Password" value="admin123">
        <button onclick="login()">Sign In</button>
        <div id="error" class="error"></div>
    </div>

    <script>
        // Hardcoded credentials for test
        const VALID_EMAIL = "admin@comium.com";
        const VALID_PASSWORD = "admin123";

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (email === VALID_EMAIL && password === VALID_PASSWORD) {
                alert("✅ LOGIN SUCCESSFUL! Redirecting to dashboard...");
                document.body.innerHTML = "<div style='text-align:center; padding:50px;'><h1>✅ Welcome to Comium NOC Dashboard</h1><p>Login successful!</p></div>";
            } else {
                document.getElementById('error').innerHTML = "❌ Invalid credentials. Use: admin@comium.com / admin123";
            }
        }
    </script>
</body>
</html>
