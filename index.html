<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Comium NOC | Enterprise Incident Management System</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a2e;
            --bg-card: #1a1a2e;
            --bg-card-secondary: #141428;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border-color: rgba(255,255,255,0.1);
            --accent: #b91c1c;
            --accent-hover: #7f1d1d;
            --input-bg: rgba(0,0,0,0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --info: #3b82f6;
        }

        body.light {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-card-secondary: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #f1f5f9;
        }

        body.blue {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-card-secondary: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        body.green {
            --bg-primary: #064e3b;
            --bg-secondary: #065f46;
            --bg-card: #065f46;
            --bg-card-secondary: #047857;
            --text-primary: #ecfdf5;
            --text-secondary: #a7f3d0;
            --accent: #10b981;
            --accent-hover: #059669;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        /* Login & Global Styles */
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: var(--bg-primary);
        }

        .login-card {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 40px;
            max-width: 460px;
            width: 100%;
            border: 1px solid var(--border-color);
        }

        .login-card input, .login-card select {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            background: var(--input-bg);
            color: var(--text-primary);
        }

        .login-card button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .dashboard { display: none; }
        
        /* Header */
        .top-bar {
            background: var(--bg-secondary);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .small-logo {
            width: 45px;
            height: 45px;
            background: var(--accent);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-section {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .user-badge {
            background: var(--bg-card-secondary);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            border: 1px solid var(--border-color);
        }

        .theme-btn {
            background: var(--bg-card-secondary);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
        }

        .logout-btn, .report-btn {
            background: var(--bg-card-secondary);
            border: 1px solid var(--border-color);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            color: var(--text-primary);
        }

        /* Navigation */
        .nav-tabs {
            background: var(--bg-secondary);
            padding: 0 32px;
            display: flex;
            gap: 5px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .tab {
            padding: 14px 28px;
            cursor: pointer;
            background: none;
            border: none;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .tab.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        .panel {
            display: none;
            padding: 28px 32px;
            background: var(--bg-primary);
        }

        .panel.active { display: block; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 22px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: var(--accent);
        }

        /* Charts */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-container {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        /* Ticket Cards */
        .ticket-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .ticket-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .ticket-id {
            font-weight: 800;
            color: var(--accent);
            background: rgba(185,28,28,0.15);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .ticket-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .status-OPEN { background: rgba(239,68,68,0.2); color: #ef4444; }
        .status-ACKNOWLEDGED { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .status-IN_PROGRESS { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .status-RESOLVED { background: rgba(16,185,129,0.2); color: #10b981; }
        .status-PENDING_CLOSURE { background: rgba(236,72,153,0.2); color: #ec4899; }
        .status-CLOSED { background: rgba(100,116,139,0.2); color: #94a3b8; }

        .ticket-actions {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Buttons */
        .btn-primary, .btn-success, .btn-warning {
            padding: 8px 18px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-warning { background: #f59e0b; color: white; }

        /* Forms */
        .form-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            color: var(--text-primary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }

        .data-table {
            width: 100%;
            background: var(--bg-card-secondary);
            border-radius: 16px;
            overflow-x: auto;
        }

        .data-table th, .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .data-table th {
            background: var(--accent);
            color: white;
        }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .ticket-grid { grid-template-columns: 1fr; }
            .charts-row { grid-template-columns: 1fr; }
            .panel { padding: 20px 16px; }
        }
    </style>
</head>
<body>

<!-- Login Page -->
<div class="login-container" id="loginContainer">
    <div class="login-card">
        <div class="small-logo" style="margin: 0 auto 20px; width: 80px; height: 80px;">
            <svg viewBox="0 0 100 100" width="45" height="45">
                <circle cx="50" cy="50" r="40" stroke="white" stroke-width="3" fill="none"/>
                <circle cx="50" cy="50" r="6" fill="white"/>
            </svg>
        </div>
        <h1 style="text-align:center; margin-bottom:10px;">Comium NOC</h1>
        <p style="text-align:center; margin-bottom:20px; color:var(--text-secondary);">Enterprise Incident Management</p>
        <input type="text" id="loginEmail" placeholder="Email" value="admin@comium.com">
        <input type="password" id="loginPassword" placeholder="Password" value="admin123">
        <select id="loginRole">
            <option value="NOC Manager">NOC Manager</option>
            <option value="Team Lead">Team Lead</option>
            <option value="Engineer">Engineer</option>
        </select>
        <button onclick="login()">Sign In →</button>
        <div id="loginError" style="color:#ef4444; text-align:center; margin-top:15px; display:none;">Invalid credentials</div>
    </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
    <div class="top-bar">
        <div class="logo-area">
            <div class="small-logo">
                <svg viewBox="0 0 100 100" width="28" height="28">
                    <circle cx="50" cy="50" r="40" stroke="white" stroke-width="3" fill="none"/>
                    <circle cx="50" cy="50" r="6" fill="white"/>
                </svg>
            </div>
            <h1>Comium NOC <span style="font-size:11px; background:rgba(185,28,28,0.2); padding:4px 10px; border-radius:20px;">Enterprise Edition</span></h1>
        </div>
        <div class="user-section">
            <button class="theme-btn" onclick="setTheme('dark')">🌙</button>
            <button class="theme-btn" onclick="setTheme('light')">☀️</button>
            <button class="theme-btn" onclick="setTheme('blue')">💙</button>
            <button class="theme-btn" onclick="setTheme('green')">💚</button>
            <div class="user-badge" id="userDisplay"></div>
            <div class="user-badge" id="roleDisplay"></div>
            <button class="report-btn" onclick="openShiftReport()">📋 Shift Report</button>
            <button class="logout-btn" onclick="logout()">Exit</button>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="tab active" onclick="showPanel('tickets')">🎫 Tickets</button>
        <button class="tab" onclick="showPanel('create')">⚡ Create Ticket</button>
        <button class="tab" onclick="showPanel('analytics')">📊 Analytics</button>
        <button class="tab" onclick="showPanel('teams')">👥 Teams</button>
        <button class="tab admin-only" onclick="showPanel('admin')" id="adminTab" style="display:none;">⚙️ Admin</button>
    </div>

    <!-- Tickets Panel -->
    <div id="panel-tickets" class="panel active">
        <div class="stats-grid" id="statsGrid"></div>
        <div class="charts-row">
            <div class="chart-container"><h3>📊 Ticket Distribution</h3><canvas id="ticketChart"></canvas></div>
            <div class="chart-container"><h3>📈 SLA Performance</h3><canvas id="slaChart"></canvas></div>
        </div>
        <div class="ticket-grid" id="ticketGrid"></div>
    </div>

    <!-- Create Ticket Panel -->
    <div id="panel-create" class="panel">
        <div class="form-card">
            <h3>🚨 Create Incident Ticket</h3>
            <div class="form-row">
                <div class="form-group"><label>Site Name</label><input type="text" id="ticketSite" placeholder="Enter site name"></div>
                <div class="form-group"><label>Incident Date</label><input type="datetime-local" id="ticketDate"></div>
            </div>
            <div class="form-group"><label>Description</label><textarea id="ticketDesc" rows="3"></textarea></div>
            <div class="form-row">
                <div class="form-group"><label>Team</label><select id="ticketTeam" onchange="updateTeamMembers()"></select></div>
                <div class="form-group"><label>Team Lead</label><select id="ticketTeamLead"></select></div>
            </div>
            <div class="form-group"><label>Assign Owner</label><select id="ticketOwner"></select></div>
            <button class="btn-primary" onclick="createTicket()" style="width:100%;">✅ Create Ticket</button>
        </div>
    </div>

    <!-- Analytics Panel -->
    <div id="panel-analytics" class="panel">
        <div class="form-card">
            <h3>📈 Performance Analytics</h3>
            <div class="filter-bar" style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px;">
                <input type="date" id="reportFromDate">
                <input type="date" id="reportToDate">
                <select id="reportTeam"><option value="">All Teams</option></select>
                <button class="btn-primary" onclick="exportAnalytics()">Export Excel</button>
            </div>
        </div>
        <div class="stats-grid" id="analyticsStats"></div>
        <div id="reportTicketsList"></div>
    </div>

    <!-- Teams Panel -->
    <div id="panel-teams" class="panel"><div id="teamsList"></div></div>

    <!-- Admin Panel (Admin Only) -->
    <div id="panel-admin" class="panel">
        <div class="form-card">
            <h3>👥 Create New Staff Account</h3>
            <div class="form-row">
                <div class="form-group"><label>Full Name</label><input type="text" id="newUserName" placeholder="John Doe"></div>
                <div class="form-group"><label>Email</label><input type="email" id="newUserEmail" placeholder="john@comium.com"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Phone</label><input type="text" id="newUserPhone" placeholder="+220 1234567"></div>
                <div class="form-group"><label>Role</label><select id="newUserRole">
                    <option value="NOC Manager">NOC Manager</option>
                    <option value="Team Lead">Team Lead</option>
                    <option value="Engineer">Engineer</option>
                </select></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Team Assignment</label><select id="newUserTeam"></select></div>
                <div class="form-group"><label>Default Password</label><input type="text" id="newUserPassword" value="welcome123" placeholder="Password"></div>
            </div>
            <button class="btn-primary" onclick="createStaffAccount()" style="width:100%;">+ Create Staff Account</button>
        </div>
        <div class="form-card">
            <h3>📋 All System Users</h3>
            <table class="data-table" id="usersTable">
                <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Team</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Shift Report Modal -->
<div id="shiftReportModal" class="modal">
    <div class="modal-content" style="max-width: 700px;">
        <h2 style="color:var(--accent); margin-bottom:20px;">📋 Shift Report</h2>
        <div id="shiftReportContent"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-primary" onclick="exportShiftReport()">📊 Export Report</button>
            <button class="btn-secondary" onclick="closeShiftReport()">Close</button>
        </div>
    </div>
</div>

<script>
    // ============= DATA MODELS =============
    let tickets = [];
    let teams = [
        { id: 1, name: "Transmission Team", users: [] },
        { id: 2, name: "Wireless Team", users: [] },
        { id: 3, name: "IPRAN Team", users: [] },
        { id: 4, name: "Core Network Team", users: [] },
        { id: 5, name: "OCS Team", users: [] },
        { id: 6, name: "Power Team", users: [] }
    ];
    
    // User database (Admin can add more)
    let users = {
        'admin@comium.com': { password: 'admin123', name: 'System Admin', phone: '+2209998888', role: 'NOC Manager', team: 'Management' }
    };
    
    let currentUser = null;
    let ticketChart = null, slaChart = null;

    // Helper Functions
    function generateTicketId() {
        const d = new Date();
        return `INC-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${String(tickets.length+1).padStart(4,'0')}`;
    }

    function setTheme(theme) {
        document.body.className = theme;
        localStorage.setItem('theme', theme);
    }

    function updateTeamMembers() {
        const teamName = document.getElementById('ticketTeam').value;
        const team = teams.find(t => t.name === teamName);
        if (team) {
            document.getElementById('ticketTeamLead').innerHTML = '<option value="">Select</option>' + team.users.filter(u => u.role === 'Team Lead').map(u => `<option value="${u.name}">${u.name}</option>`).join('');
            document.getElementById('ticketOwner').innerHTML = '<option value="">Select</option>' + team.users.filter(u => u.role === 'Engineer').map(u => `<option value="${u.name}">${u.name}</option>`).join('');
        }
    }

    function createTicket() {
        const site = document.getElementById('ticketSite').value;
        const date = document.getElementById('ticketDate').value;
        const desc = document.getElementById('ticketDesc').value;
        const team = document.getElementById('ticketTeam').value;
        const teamLead = document.getElementById('ticketTeamLead').value;
        const owner = document.getElementById('ticketOwner').value;
        if (!site || !desc || !team) { alert('Please fill required fields'); return; }
        const ticket = {
            id: generateTicketId(), site, createdAt: new Date().toISOString(),
            occurredAt: date || new Date().toISOString(), description: desc, team, teamLead, owner,
            status: 'OPEN', severity: 'Critical', acknowledgementTime: null, inProgressTime: null,
            resolutionTime: null, outageDuration: 0, rca: '', resolution: '', assignedTo: owner,
            slaDeadline: new Date(Date.now() + 3600000).toISOString(), closedBy: null
        };
        tickets.unshift(ticket);
        renderTickets();
        showPanel('tickets');
        alert(`✅ Ticket ${ticket.id} created!`);
    }

    function updateTicketStatus(id, status) {
        const t = tickets.find(x=>x.id===id);
        if(t) { t.status = status; if(status==='ACKNOWLEDGED') t.acknowledgementTime = new Date().toISOString(); if(status==='IN_PROGRESS') t.inProgressTime = new Date().toISOString(); renderTickets(); alert(`Ticket ${id} updated to ${status}`); }
    }

    function resolveTicket(id) {
        const t = tickets.find(x=>x.id===id);
        const rca = prompt('Enter RCA:'); const res = prompt('Enter Resolution:'); const outage = prompt('Outage duration (minutes):');
        if(rca && res) { t.rca = rca; t.resolution = res; t.outageDuration = parseInt(outage) || 0; t.status = 'RESOLVED'; t.resolutionTime = new Date().toISOString(); renderTickets(); alert(`✅ Ticket ${id} resolved`); }
    }

    // Dashboard Statistics
    function getTicketStats() {
        return {
            total: tickets.length,
            open: tickets.filter(t=>t.status==='OPEN').length,
            acknowledged: tickets.filter(t=>t.status==='ACKNOWLEDGED').length,
            inProgress: tickets.filter(t=>t.status==='IN_PROGRESS').length,
            resolved: tickets.filter(t=>t.status==='RESOLVED').length,
            pendingClosure: tickets.filter(t=>t.status==='PENDING_CLOSURE').length,
            closed: tickets.filter(t=>t.status==='CLOSED').length,
            assignedToOthers: tickets.filter(t=>t.assignedTo && t.assignedTo !== currentUser?.name && t.status!=='CLOSED').length,
            pendingByOwner: tickets.filter(t=>t.owner === currentUser?.name && t.status!=='CLOSED' && t.status!=='RESOLVED').length
        };
    }

    function renderTickets() {
        const container = document.getElementById('ticketGrid');
        if (!container) return;
        
        const stats = getTicketStats();
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><h4>Total Tickets</h4><div class="stat-number">${stats.total}</div></div>
            <div class="stat-card"><h4>Open</h4><div class="stat-number">${stats.open}</div></div>
            <div class="stat-card"><h4>In Progress</h4><div class="stat-number">${stats.inProgress}</div></div>
            <div class="stat-card"><h4>Pending Closure</h4><div class="stat-number">${stats.pendingClosure}</div></div>
            <div class="stat-card"><h4>Closed</h4><div class="stat-number">${stats.closed}</div></div>
            <div class="stat-card"><h4>Pending by You</h4><div class="stat-number">${stats.pendingByOwner}</div></div>`;
        
        let filtered = tickets;
        if (currentUser?.role === 'Engineer') filtered = tickets.filter(t => t.owner === currentUser?.name);
        else if (currentUser?.role === 'Team Lead') filtered = tickets.filter(t => t.teamLead === currentUser?.name);
        
        container.innerHTML = filtered.map(t => `<div class="ticket-card"><div class="ticket-header"><span class="ticket-id">${t.id}</span><span class="ticket-status status-${t.status}">${t.status}</span></div><div><strong>📍 ${t.site}</strong></div><div class="ticket-detail">👤 ${t.owner || 'Unassigned'} | 🏢 ${t.team}</div><div class="ticket-actions">${t.status==='OPEN'?`<button class="btn-primary" onclick="updateTicketStatus('${t.id}','ACKNOWLEDGED')">✅ Acknowledge</button>`:''}${t.status==='ACKNOWLEDGED'?`<button class="btn-primary" onclick="updateTicketStatus('${t.id}','IN_PROGRESS')">▶ Start</button>`:''}${t.status==='IN_PROGRESS'?`<button class="btn-success" onclick="resolveTicket('${t.id}')">🔧 Resolve</button>`:''}</div></div>`).join('');
        
        // Update charts
        const statusCounts = ['OPEN','ACKNOWLEDGED','IN_PROGRESS','RESOLVED','PENDING_CLOSURE','CLOSED'].map(s => tickets.filter(t=>t.status===s).length);
        if (ticketChart) ticketChart.destroy();
        ticketChart = new Chart(document.getElementById('ticketChart'), { type: 'doughnut', data: { labels: ['Open','Acknowledged','In Progress','Resolved','Pending Closure','Closed'], datasets: [{ data: statusCounts, backgroundColor: ['#ef4444','#f59e0b','#3b82f6','#10b981','#ec4899','#64748b'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: getComputedStyle(document.body).getPropertyValue('--text-secondary') } } } } });
        
        const slaData = tickets.slice(0,7).map(t => Math.min(100, Math.round((new Date(t.slaDeadline) - new Date(t.createdAt)) / 36000)));
        if (slaChart) slaChart.destroy();
        slaChart = new Chart(document.getElementById('slaChart'), { type: 'line', data: { labels: tickets.slice(0,7).map(t=>t.id), datasets: [{ label: 'SLA Remaining (%)', data: slaData, borderColor: '#10b981', fill: false }] }, options: { responsive: true } });
    }

    // Admin Functions - Create Staff Account
    function createStaffAccount() {
        if (currentUser?.role !== 'NOC Manager') { alert('Only NOC Manager can create accounts'); return; }
        const name = document.getElementById('newUserName').value.trim();
        const email = document.getElementById('newUserEmail').value.trim();
        const phone = document.getElementById('newUserPhone').value.trim();
        const role = document.getElementById('newUserRole').value;
        const teamName = document.getElementById('newUserTeam').value;
        const password = document.getElementById('newUserPassword').value;
        
        if (!name || !email || !phone) { alert('Please fill all fields'); return; }
        if (users[email]) { alert('User with this email already exists'); return; }
        
        users[email] = { password: password, name: name, phone: phone, role: role, team: teamName };
        
        // Add to team if team selected
        if (teamName) {
            const team = teams.find(t => t.name === teamName);
            if (team) team.users.push({ name, email, phone, role });
        }
        
        renderUsersTable();
        renderTeams();
        alert(`✅ Staff account created for ${name}\nEmail: ${email}\nPassword: ${password}`);
        document.getElementById('newUserName').value = '';
        document.getElementById('newUserEmail').value = '';
        document.getElementById('newUserPhone').value = '';
    }

    function renderUsersTable() {
        const tbody = document.querySelector('#usersTable tbody');
        if (!tbody) return;
        tbody.innerHTML = '';
        for (const [email, user] of Object.entries(users)) {
            const row = tbody.insertRow();
            row.insertCell(0).innerHTML = user.name;
            row.insertCell(1).innerHTML = email;
            row.insertCell(2).innerHTML = user.phone || '—';
            row.insertCell(3).innerHTML = user.role;
            row.insertCell(4).innerHTML = user.team || '—';
        }
    }

    // Shift Report Functions
    function openShiftReport() {
        const stats = getTicketStats();
        const today = new Date().toLocaleDateString();
        const now = new Date().toLocaleString();
        
        const assignedToCurrent = tickets.filter(t => t.assignedTo === currentUser?.name && t.status !== 'CLOSED').length;
        const pendingByCurrent = tickets.filter(t => t.owner === currentUser?.name && t.status !== 'CLOSED' && t.status !== 'RESOLVED').length;
        
        const reportHTML = `
            <div style="background:var(--bg-card-secondary); padding:20px; border-radius:16px; margin-bottom:15px;">
                <h3 style="color:var(--accent);">📋 Shift Summary Report</h3>
                <p><strong>Generated by:</strong> ${currentUser?.name} (${currentUser?.role})</p>
                <p><strong>Date/Time:</strong> ${now}</p>
                <p><strong>Shift Period:</strong> ${today}</p>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
                <div style="background:var(--bg-card-secondary); padding:15px; border-radius:16px;"><strong>📊 Total Tickets (All):</strong><br><span style="font-size:28px; color:var(--accent);">${stats.total}</span></div>
                <div style="background:var(--bg-card-secondary); padding:15px; border-radius:16px;"><strong>✅ Closed Today:</strong><br><span style="font-size:28px; color:#10b981;">${stats.closed}</span></div>
                <div style="background:var(--bg-card-secondary); padding:15px; border-radius:16px;"><strong>🔄 Open / In Progress:</strong><br><span style="font-size:28px; color:#f59e0b;">${stats.open + stats.inProgress}</span></div>
                <div style="background:var(--bg-card-secondary); padding:15px; border-radius:16px;"><strong>⏳ Pending Closure:</strong><br><span style="font-size:28px; color:#ec4899;">${stats.pendingClosure}</span></div>
                <div style="background:var(--bg-card-secondary); padding:15px; border-radius:16px;"><strong>👤 Assigned to You:</strong><br><span style="font-size:28px; color:#3b82f6;">${assignedToCurrent}</span></div>
                <div style="background:var(--bg-card-secondary); padding:15px; border-radius:16px;"><strong>⚠️ Pending Your Action:</strong><br><span style="font-size:28px; color:#ef4444;">${pendingByCurrent}</span></div>
            </div>
            <div style="background:var(--bg-card-secondary); padding:15px; border-radius:16px;">
                <h4>📋 Assigned to Other Teams/Owners:</h4>
                <ul style="margin-top:10px;">
                    <li>Total tickets assigned to others: ${stats.assignedToOthers}</li>
                    <li>Pending with other owners: ${tickets.filter(t => t.owner !== currentUser?.name && t.status !== 'CLOSED').length}</li>
                </ul>
            </div>
            <div style="margin-top:15px; padding:10px; background:rgba(16,185,129,0.1); border-radius:12px;">
                <strong>📨 This report will be sent to NOC Manager & Team Lead</strong>
            </div>
        `;
        document.getElementById('shiftReportContent').innerHTML = reportHTML;
        document.getElementById('shiftReportModal').style.display = 'flex';
        
        // Send notification to NOC Manager and Team Lead (simulated)
        sendShiftNotification();
    }
    
    function sendShiftNotification() {
        // Find NOC Manager email
        const nocManager = Object.entries(users).find(([_, u]) => u.role === 'NOC Manager');
        const teamLead = currentUser?.role === 'Team Lead' ? currentUser : null;
        if (nocManager) console.log(`📧 Shift report sent to NOC Manager: ${nocManager[0]}`);
        alert(`📧 Shift report notification sent to NOC Manager${teamLead ? ' and Team Lead' : ''}`);
    }

    function exportShiftReport() {
        const stats = getTicketStats();
        const reportData = [{
            'Generated By': currentUser?.name,
            'Role': currentUser?.role,
            'Date': new Date().toLocaleString(),
            'Total Tickets': stats.total,
            'Open Tickets': stats.open,
            'In Progress': stats.inProgress,
            'Pending Closure': stats.pendingClosure,
            'Closed Tickets': stats.closed,
            'Assigned To You': tickets.filter(t => t.assignedTo === currentUser?.name && t.status !== 'CLOSED').length,
            'Pending Your Action': tickets.filter(t => t.owner === currentUser?.name && t.status !== 'CLOSED' && t.status !== 'RESOLVED').length,
            'Assigned to Others': stats.assignedToOthers
        }];
        const ws = XLSX.utils.json_to_sheet(reportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Shift Report');
        XLSX.writeFile(wb, `Shift_Report_${currentUser?.name}_${new Date().toISOString().slice(0,19)}.xlsx`);
        alert('Shift report exported!');
    }

    function closeShiftReport() { document.getElementById('shiftReportModal').style.display = 'none'; }

    function renderTeams() {
        const container = document.getElementById('teamsList');
        const teamSelect = document.getElementById('ticketTeam');
        const adminTeamSelect = document.getElementById('newUserTeam');
        const reportTeamSelect = document.getElementById('reportTeam');
        if (teamSelect) teamSelect.innerHTML = '<option value="">Select</option>' + teams.map(t=>`<option value="${t.name}">${t.name}</option>`).join('');
        if (adminTeamSelect) adminTeamSelect.innerHTML = '<option value="">No Team</option>' + teams.map(t=>`<option value="${t.name}">${t.name}</option>`).join('');
        if (reportTeamSelect) reportTeamSelect.innerHTML = '<option value="">All Teams</option>' + teams.map(t=>`<option value="${t.name}">${t.name}</option>`).join('');
        if (container) container.innerHTML = teams.map(team => `<div class="form-card"><h4>🏢 ${team.name}</h4><table class="data-table"><thead><tr><th>Name</th><th>Role</th><th>Email</th><th>Phone</th></tr></thead><tbody>${team.users.map(u=>`<tr><td>${u.name}</td><td>${u.role}</td><td>${u.email}</td><td>${u.phone}</td></tr>`).join('')}</tbody></table></div>`).join('');
    }

    function exportAnalytics() {
        const data = tickets.map(t=>({'ID':t.id,'Site':t.site,'Team':t.team,'Owner':t.owner,'Status':t.status,'Outage(min)':t.outageDuration,'RCA':t.rca,'Resolution':t.resolution}));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Analytics');
        XLSX.writeFile(wb, `Analytics_${new Date().toISOString().slice(0,10)}.xlsx`);
        alert('Analytics exported!');
    }

    function showPanel(name) {
        document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        document.getElementById(`panel-${name}`).classList.add('active');
        if(event?.target) event.target.classList.add('active');
        if(name === 'tickets') renderTickets();
        if(name === 'teams') renderTeams();
        if(name === 'create') document.getElementById('ticketDate').value = new Date().toISOString().slice(0,16);
        if(name === 'analytics') renderAnalytics();
    }

    function renderAnalytics() {
        const stats = getTicketStats();
        document.getElementById('analyticsStats').innerHTML = `
            <div class="stat-card"><h4>Total Tickets</h4><div class="stat-number">${stats.total}</div></div>
            <div class="stat-card"><h4>Closed</h4><div class="stat-number">${stats.closed}</div></div>
            <div class="stat-card"><h4>Open + In Progress</h4><div class="stat-number">${stats.open + stats.inProgress}</div></div>
            <div class="stat-card"><h4>Pending Closure</h4><div class="stat-number">${stats.pendingClosure}</div></div>
            <div class="stat-card"><h4>Assigned to Others</h4><div class="stat-number">${stats.assignedToOthers}</div></div>
            <div class="stat-card"><h4>Pending by Owners</h4><div class="stat-number">${stats.pendingByOwner}</div></div>`;
    }

    // Login Logic
    function login() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const role = document.getElementById('loginRole').value;
        const user = users[email];
        if (user && user.password === password) {
            currentUser = { email, name: user.name, phone: user.phone, role: user.role || role };
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('userDisplay').innerHTML = `👤 ${currentUser.name}`;
            document.getElementById('roleDisplay').innerHTML = `🎯 ${currentUser.role}`;
            
            // Show admin tab only for NOC Manager
            if (currentUser.role === 'NOC Manager') {
                document.getElementById('adminTab').style.display = 'block';
            } else {
                document.getElementById('adminTab').style.display = 'none';
            }
            
            renderTickets(); renderTeams(); renderUsersTable();
        } else {
            document.getElementById('loginError').style.display = 'block';
            setTimeout(()=>document.getElementById('loginError').style.display='none',3000);
        }
    }

    function logout() { currentUser = null; document.getElementById('loginContainer').style.display = 'flex'; document.getElementById('dashboard').style.display = 'none'; }

    // Initialize sample data
    teams[0].users = [{ name:"John Smith", email:"john@comium.com", phone:"+2207771111", role:"Team Lead" },{ name:"Mike Jones", email:"mike@comium.com", phone:"+2207772222", role:"Engineer" }];
    teams[5].users = [{ name:"Sarah Wilson", email:"sarah@comium.com", phone:"+2207773333", role:"Team Lead" },{ name:"David Brown", email:"david@comium.com", phone:"+2207774444", role:"Engineer" }];
    
    // Add sample users
    users['john@comium.com'] = { password: 'john123', name: 'John Smith', phone: '+2207771111', role: 'Team Lead', team: 'Transmission Team' };
    users['sarah@comium.com'] = { password: 'sarah123', name: 'Sarah Wilson', phone: '+2207773333', role: 'Team Lead', team: 'Power Team' };
    users['mike@comium.com'] = { password: 'mike123', name: 'Mike Jones', phone: '+2207772222', role: 'Engineer', team: 'Transmission Team' };
    users['david@comium.com'] = { password: 'david123', name: 'David Brown', phone: '+2207774444', role: 'Engineer', team: 'Power Team' };
    
    // Sample tickets
    for(let i=1;i<=12;i++) tickets.push({ id:`INC-2025120${i}`, site:`Site ${i}`, createdAt:new Date(Date.now()-i*86400000).toISOString(), occurredAt:new Date(Date.now()-i*86400000).toISOString(), description:`Sample incident ${i}`, team:i%2===0?'Power Team':'Transmission Team', owner:i%2===0?'David Brown':'Mike Jones', teamLead:i%2===0?'Sarah Wilson':'John Smith', status:i%3===0?'OPEN':i%3===1?'IN_PROGRESS':'RESOLVED', outageDuration:Math.floor(Math.random()*120)+30, rca:i%2===0?'Power fluctuation':'Signal loss', resolution:i%2===0?'Generator started':'Link restored', assignedTo:i%2===0?'David Brown':'Mike Jones', slaDeadline:new Date(Date.now()+3600000).toISOString() });
    
    const savedTheme = localStorage.getItem('theme') || 'dark';
    setTheme(savedTheme);
    renderTeams();
</script>
