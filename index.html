<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Connection Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a2e; color: white; }
        .pass { color: #10b981; }
        .fail { color: #ef4444; }
        .info { color: #f59e0b; }
        pre { background: #0f172a; padding: 10px; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔍 Supabase Connection Diagnostic</h1>
    <div id="output"></div>

    <script>
        const output = document.getElementById('output');
        
        function log(msg, type = 'info') {
            const color = type === 'pass' ? 'pass' : (type === 'fail' ? 'fail' : 'info');
            output.innerHTML += `<div class="${color}">${msg}</div>`;
        }

        // YOUR CREDENTIALS
        const SUPABASE_URL = 'https://sytichlbyvsacrppukrm.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_j57-kq4_T_Wn-IcRodyUEA_M8XZMiMx';

        log('🔧 Testing Supabase Connection...');
        log(`📡 URL: ${SUPABASE_URL}`);
        log(`🔑 Key: ${SUPABASE_ANON_KEY.substring(0, 30)}...`);

        async function runTests() {
            // Test 1: Create client
            try {
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                log('✅ Client created successfully', 'pass');
                
                // Test 2: Try to fetch from staffs table
                log('📞 Attempting to fetch from "staffs" table...');
                const { data, error } = await supabase.from('staffs').select('*');
                
                if (error) {
                    log(`❌ ERROR: ${error.message}`, 'fail');
                    log(`📋 Error details: ${JSON.stringify(error, null, 2)}`, 'fail');
                    
                    if (error.message.includes('JWT')) {
                        log('🔑 The API key appears to be invalid or malformed', 'fail');
                    } else if (error.message.includes('relation') && error.message.includes('does not exist')) {
                        log('📋 The "staffs" table does not exist in your database', 'fail');
                        log('💡 Run the CREATE TABLE SQL in Supabase SQL Editor', 'info');
                    } else if (error.message.includes('permission')) {
                        log('🔒 Permission denied. RLS may be blocking. Run: ALTER TABLE staffs DISABLE ROW LEVEL SECURITY;', 'info');
                    }
                } else {
                    log(`✅ SUCCESS! Found ${data.length} records in staffs table`, 'pass');
                    log(`📊 Data: ${JSON.stringify(data, null, 2)}`, 'pass');
                    
                    // Check for admin user
                    const admin = data.find(u => u.email === 'admin@comium.com');
                    if (admin) {
                        log(`✅ Admin user found: ${admin.email} (Password: ${admin.password})`, 'pass');
                        log('🎉 You can now login with admin@comium.com / admin123', 'pass');
                    } else {
                        log('⚠️ Admin user not found. Run INSERT INTO staffs...', 'info');
                    }
                }
                
                // Test 3: Check other tables
                log('--- Checking other tables ---');
                
                const tables = ['tickets', 'sites', 'shift_reports'];
                for (const table of tables) {
                    const { error: tableError } = await supabase.from(table).select('count', { count: 'exact', head: true });
                    if (tableError) {
                        log(`❌ Table "${table}": ${tableError.message}`, 'fail');
                    } else {
                        log(`✅ Table "${table}": exists`, 'pass');
                    }
                }
                
            } catch (err) {
                log(`❌ CRITICAL ERROR: ${err.message}`, 'fail');
                console.error(err);
            }
        }
        
        runTests();
    </script>
</body>
</html>
