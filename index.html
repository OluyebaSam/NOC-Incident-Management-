<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comium NOC | Incident Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 380px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .login-box h1 {
            color: #b91c1c;
            margin-bottom: 10px;
        }
        .login-box p {
            color: #666;
            margin-bottom: 25px;
        }
        .login-box input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: #b91c1c;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .error {
            color: red;
            margin-top: 15px;
            display: none;
        }
        .dashboard {
            display: none;
            width: 100%;
            max-width: 1200px;
            margin: 20px;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #b91c1c;
        }
        .ticket-list {
            background: white;
            border-radius: 15px;
            padding: 20px;
        }
        .ticket-item {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }
        button {
            background: #b91c1c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        .logout-btn {
            background: #333;
        }
        .flex {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-box">
    <h1>🔴 Comium NOC</h1>
    <p>Incident Management System</p>
    <input type="text" id="email" placeholder="Email" value="admin@comium.com">
    <input type="password" id="password" placeholder="Password" value="admin123">
    <button onclick="login()">Sign In →</button>
    <div id="loginError" class="error"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
    <div class="header">
        <h1>🔴 Comium NOC Dashboard</h1>
        <div>
            <span id="userName" style="margin-right: 15px;"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
    
    <div class="stats">
        <div class="stat-card"><h3>Total Tickets</h3><div class="stat-number" id="totalTickets">0</div></div>
        <div class="stat-card"><h3>Open</h3><div class="stat-number" id="openTickets">0</div></div>
        <div class="stat-card"><h3>In Progress</h3><div class="stat-number" id="progressTickets">0</div></div>
        <div class="stat-card"><h3>Closed</h3><div class="stat-number" id="closedTickets">0</div></div>
    </div>
    
    <div class="ticket-list">
        <h2>📋 Incident Tickets</h2>
        <button onclick="showCreateForm()" style="margin: 10px 0;">+ Create New Ticket</button>
        <div id="ticketForm" style="display:none; margin: 15px 0; padding: 15px; border: 1px solid #ddd; border-radius: 10px;">
            <input type="text" id="ticketSite" placeholder="Site Name" style="width:100%; margin:5px 0; padding:8px;">
            <textarea id="ticketDesc" placeholder="Description" rows="3" style="width:100%; margin:5px 0; padding:8px;"></textarea>
            <select id="ticketTeam" style="width:100%; margin:5px 0; padding:8px;">
                <option value="Transmission Team">Transmission Team</option>
                <option value="Wireless Team">Wireless Team</option>
                <option value="Power Team">Power Team</option>
            </select>
            <button onclick="createTicket()">Save Ticket</button>
            <button onclick="hideCreateForm()">Cancel</button>
        </div>
        <div id="ticketsList"></div>
    </div>
</div>

<script>
    // Data storage
    let tickets = [];
    let currentUser = null;
    
    // Admin only - single user
    const ADMIN_EMAIL = "admin@comium.com";
    const ADMIN_PASSWORD = "admin123";
    
    function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
            currentUser = { email: email, name: "Admin" };
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('userName').innerHTML = "👤 Admin";
            loadTickets();
            renderDashboard();
        } else {
            document.getElementById('loginError').innerHTML = "❌ Invalid credentials. Use: admin@comium.com / admin123";
            document.getElementById('loginError').style.display = 'block';
            setTimeout(() => {
                document.getElementById('loginError').style.display = 'none';
            }, 3000);
        }
    }
    
    function logout() {
        currentUser = null;
        document.getElementById('loginPage').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('email').value = 'admin@comium.com';
        document.getElementById('password').value = 'admin123';
        document.getElementById('loginError').style.display = 'none';
    }
    
    function loadTickets() {
        const saved = localStorage.getItem('comium_tickets');
        if (saved) {
            tickets = JSON.parse(saved);
        } else {
            // Sample tickets
            tickets = [
                { id: "INC-001", site: "Old Yundum 4", description: "NE Is Disconnected", team: "Power Team", status: "OPEN", createdAt: new Date().toISOString() },
                { id: "INC-002", site: "Latriya", description: "Power Failure", team: "Transmission Team", status: "IN_PROGRESS", createdAt: new Date().toISOString() },
                { id: "INC-003", site: "Bwiam", description: "Mains Failure", team: "Power Team", status: "RESOLVED", createdAt: new Date().toISOString() }
            ];
            saveTickets();
        }
    }
    
    function saveTickets() {
        localStorage.setItem('comium_tickets', JSON.stringify(tickets));
    }
    
    function generateTicketId() {
        return "INC-" + new Date().getFullYear() + String(new Date().getMonth()+1).padStart(2,'0') + String(new Date().getDate()).padStart(2,'0') + "-" + String(tickets.length + 1).padStart(3,'0');
    }
    
    function createTicket() {
        const site = document.getElementById('ticketSite').value;
        const desc = document.getElementById('ticketDesc').value;
        const team = document.getElementById('ticketTeam').value;
        
        if (!site || !desc) {
            alert("Please fill all fields");
            return;
        }
        
        const newTicket = {
            id: generateTicketId(),
            site: site,
            description: desc,
            team: team,
            status: "OPEN",
            createdAt: new Date().toISOString()
        };
        
        tickets.unshift(newTicket);
        saveTickets();
        renderDashboard();
        hideCreateForm();
        alert("✅ Ticket " + newTicket.id + " created!");
    }
    
    function updateTicketStatus(id, newStatus) {
        const ticket = tickets.find(t => t.id === id);
        if (ticket) {
            ticket.status = newStatus;
            saveTickets();
            renderDashboard();
            alert(`Ticket ${id} updated to ${newStatus}`);
        }
    }
    
    function renderDashboard() {
        const stats = {
            total: tickets.length,
            open: tickets.filter(t => t.status === "OPEN").length,
            progress: tickets.filter(t => t.status === "IN_PROGRESS").length,
            resolved: tickets.filter(t => t.status === "RESOLVED").length,
            closed: tickets.filter(t => t.status === "CLOSED").length
        };
        
        document.getElementById('totalTickets').innerHTML = stats.total;
        document.getElementById('openTickets').innerHTML = stats.open;
        document.getElementById('progressTickets').innerHTML = stats.progress;
        document.getElementById('closedTickets').innerHTML = stats.closed;
        
        const container = document.getElementById('ticketsList');
        if (tickets.length === 0) {
            container.innerHTML = "<p>No tickets found.</p>";
            return;
        }
        
        container.innerHTML = tickets.map(ticket => `
            <div class="ticket-item">
                <strong>${ticket.id}</strong> - ${ticket.site}<br>
                <small>${ticket.description}</small><br>
                <small>Team: ${ticket.team} | Status: <strong style="color:${getStatusColor(ticket.status)}">${ticket.status}</strong></small><br>
                <small>Created: ${new Date(ticket.createdAt).toLocaleString()}</small>
                <div class="flex">
                    ${ticket.status === "OPEN" ? `<button onclick="updateTicketStatus('${ticket.id}','ACKNOWLEDGED')">✅ Acknowledge</button>` : ""}
                    ${ticket.status === "ACKNOWLEDGED" ? `<button onclick="updateTicketStatus('${ticket.id}','IN_PROGRESS')">▶ Start Progress</button>` : ""}
                    ${ticket.status === "IN_PROGRESS" ? `<button onclick="updateTicketStatus('${ticket.id}','RESOLVED')">🔧 Resolve</button>` : ""}
                    ${ticket.status === "RESOLVED" ? `<button onclick="updateTicketStatus('${ticket.id}','CLOSED')">🔒 Close</button>` : ""}
                </div>
            </div>
        `).join('');
    }
    
    function getStatusColor(status) {
        switch(status) {
            case "OPEN": return "#ef4444";
            case "ACKNOWLEDGED": return "#f59e0b";
            case "IN_PROGRESS": return "#3b82f6";
            case "RESOLVED": return "#10b981";
            case "CLOSED": return "#64748b";
            default: return "#666";
        }
    }
    
    function showCreateForm() {
        document.getElementById('ticketForm').style.display = 'block';
    }
    
    function hideCreateForm() {
        document.getElementById('ticketForm').style.display = 'none';
        document.getElementById('ticketSite').value = '';
        document.getElementById('ticketDesc').value = '';
    }
</script>
</body>
</html>
