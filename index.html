<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comium NOC - Supabase Version</title>

/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f5f7fa; }
.login { text-align:center; margin-top:150px; }
input,button { padding:10px; margin:8px; }
.container { display:none; }
.card { background:white; padding:15px; margin:10px; border-radius:8px; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
    <h2>Comium NOC</h2>
    <input id="loginEmail" placeholder="Email"><br>
    <input id="loginPassword" type="password" placeholder="Password"><br>
    <button onclick="doLogin()">Login</button>
</div>

<!-- APP -->
<div class="container" id="app">

<h3 id="userDisplay"></h3>

<button onclick="doLogout()">Logout</button>

<hr>

<!-- CREATE -->
<div class="card">
    <h3>Create Ticket</h3>
    <input id="site" placeholder="Site"><br>
    <input id="desc" placeholder="Description"><br>

    <select id="status">
        <option>Open</option>
        <option>Assigned</option>
        <option>Handling</option>
        <option>Processed</option>
        <option>Closed</option>
    </select><br>

    <select id="priority">
        <option>Critical</option>
        <option>Major</option>
        <option>Minor</option>
    </select><br>

    <input id="team" placeholder="Team"><br>
    <input id="assignee" placeholder="Assignee"><br>

    <button onclick="createTicket()">Create</button>
</div>

<!-- STATS -->
<div class="card">
    <h3>Dashboard</h3>
    Total: <span id="total"></span><br>
    Open: <span id="open"></span><br>
</div>

<!-- TICKETS -->
<div class="card">
    <h3>Tickets</h3>
    <div id="tickets"></div>
</div>

</div>

<script>

/* =========================
   ✅ SUPABASE CONFIG
========================= */

const SUPABASE_URL = "https://YOUR_PROJECT_ID.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let tickets = [];

/* =========================
   ✅ LOGIN
========================= */

async function doLogin() {
    const email = loginEmail.value;
    const password = loginPassword.value;

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) return alert(error.message);

    currentUser = data.user;

    loginPage.style.display = 'none';
    app.style.display = 'block';

    loadProfile();
    loadTickets();
}

async function doLogout() {
    await sb.auth.signOut();
    location.reload();
}

/* =========================
   ✅ PROFILE
========================= */

async function loadProfile() {
    const { data } = await sb
        .from('users')
        .select('*')
        .eq('email', currentUser.email)
        .single();

    userDisplay.innerText = "👤 " + (data?.name || currentUser.email);
}

/* =========================
   ✅ CREATE TICKET
========================= */

function genID() {
    return "INC-" + Date.now();
}

async function createTicket() {
    const { error } = await sb.from('tickets').insert([{
        ticket_id: genID(),
        site: site.value,
        description: desc.value,
        status: status.value,
        priority: priority.value,
        team_assigned: team.value,
        assignee: assignee.value
    }]);

    if (error) return alert(error.message);

    alert("✅ Created");
    loadTickets();
}

/* =========================
   ✅ LOAD TICKETS
========================= */

async function loadTickets() {
    const { data, error } = await sb
        .from('tickets')
        .select('*')
        .order('created_at', { ascending:false });

    if (error) return;

    tickets = data;
    renderTickets();
    renderStats();
}

/* =========================
   ✅ UPDATE
========================= */

async function updateStatus(id, status) {
    await sb.from('tickets')
        .update({ status: status })
        .eq('id', id);

    loadTickets();
}

/* =========================
   ✅ RENDER
========================= */

function renderStats() {
    total.innerText = tickets.length;
    open.innerText = tickets.filter(t=>t.status==='Open').length;
}

function renderTickets() {
    ticketsDiv = document.getElementById('tickets');

    ticketsDiv.innerHTML = tickets.map(t => `
        <div class="card">
            <b>${t.ticket_id}</b><br>
            ${t.site}<br>
            ${t.description}<br>

            Status: ${t.status}<br>

            ${t.status === 'Assigned' ? 
                `<button onclick="updateStatus('${t.id}','Handling')">Handle</button>` : ''}

            ${t.status === 'Handling' ? 
                `<button onclick="updateStatus('${t.id}','Processed')">Process</button>` : ''}

            ${t.status === 'Processed' ? 
                `<button onclick="updateStatus('${t.id}','Closed')">Close</button>` : ''}
        </div>
    `).join('');
}

/* =========================
   ✅ REALTIME
========================= */

sb.channel('live')
.on('postgres_changes',
    { event:'*', schema:'public', table:'tickets' },
    payload => loadTickets()
).subscribe();

/* =========================
   ✅ AUTO LOGIN
========================= */

window.onload = async () => {
    const { data } = await sb.auth.getSession();

    if (data.session) {
        currentUser = data.session.user;
        loginPage.style.display = 'none';
        app.style.display = 'block';
        loadProfile();
        loadTickets();
    }
};

</script>

</body>
</html>
