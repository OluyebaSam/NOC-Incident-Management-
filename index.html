<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comium NOC | Advanced Incident Management</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Dark Mode (Default) */
        body {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #1e1e2f;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --border-color: #2a2a3e;
            --accent: #dc2626;
            --accent-hover: #b91c1c;
            --success: #10b981;
            --warning: #f59e0b;
            --info: #3b82f6;
            --input-bg: #2a2a3e;
        }

        body.light {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #666666;
            --border-color: #e0e0e0;
            --accent: #dc2626;
            --accent-hover: #b91c1c;
            --input-bg: #f5f5f5;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        /* Login Page */
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .login-card h1 { color: var(--accent); margin-bottom: 10px; }
        .login-card p { color: var(--text-secondary); margin-bottom: 25px; }
        .login-card input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 16px;
        }
        .login-card button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        .error-msg { color: #ef4444; margin-top: 15px; display: none; }

        /* Dashboard */
        .dashboard { display: none; }
        
        /* Header */
        .header {
            background: var(--bg-secondary);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo h1 { color: var(--accent); font-size: 24px; }
        .header-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .theme-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-primary);
        }
        .user-badge {
            background: var(--bg-card);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            border: 1px solid var(--border-color);
        }
        .logout-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        /* Navigation */
        .nav-tabs {
            background: var(--bg-secondary);
            padding: 0 32px;
            display: flex;
            gap: 5px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }
        .tab {
            padding: 14px 28px;
            cursor: pointer;
            background: none;
            border: none;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        /* Panels */
        .panel { display: none; padding: 28px 32px; }
        .panel.active { display: block; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--bg-card);
            padding: 22px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .stat-number { font-size: 36px; font-weight: 800; color: var(--accent); }

        /* Chart Container */
        .chart-container {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }
        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Ticket Grid */
        .ticket-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .ticket-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent);
        }
        .ticket-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .ticket-id { font-weight: 700; color: var(--accent); }
        .ticket-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-OPEN { background: #fee2e2; color: #dc2626; }
        .status-RESOLVED { background: #d1fae5; color: #065f46; }
        .status-CLOSED { background: #e5e7eb; color: #374151; }
        .ticket-actions { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-primary, .btn-success, .btn-warning {
            padding: 6px 14px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-warning { background: #f59e0b; color: white; }

        /* Forms */
        .form-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
        }

        /* Table */
        .data-table {
            width: 100%;
            background: var(--bg-card);
            border-radius: 16px;
            overflow-x: auto;
        }
        .data-table th, .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .data-table th { background: rgba(220,38,38,0.1); color: var(--accent); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .ticket-grid { grid-template-columns: 1fr; }
            .charts-row { grid-template-columns: 1fr; }
            .panel { padding: 20px 16px; }
            .nav-tabs { padding: 0 16px; overflow-x: auto; }
        }
    </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginContainer" class="login-container">
    <div class="login-card">
        <h1>🔴 COMIUM NOC</h1>
        <p>Advanced Incident Management System</p>
        <input type="text" id="loginEmail" placeholder="Email" value="admin@comium.com">
        <input type="password" id="loginPassword" placeholder="Password" value="admin123">
        <button onclick="login()">Sign In →</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
    <div class="header">
        <div class="logo"><h1>🔴 COMIUM NOC <span style="font-size:12px;">Advanced Platform</span></h1></div>
        <div class="header-actions">
            <button class="theme-btn" onclick="toggleTheme()">🌓 Dark/Light</button>
            <div class="user-badge" id="userDisplay">Admin</div>
            <button class="logout-btn" onclick="logout()">Exit</button>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="tab active" onclick="showPanel('dashboard')">📊 Dashboard</button>
        <button class="tab" onclick="showPanel('tickets')">🎫 Tickets</button>
        <button class="tab" onclick="showPanel('create')">➕ Create Ticket</button>
        <button class="tab" onclick="showPanel('changeRequest')">📝 Change Request</button>
        <button class="tab" onclick="showPanel('reports')">📈 Reports</button>
    </div>

    <!-- Dashboard Panel -->
    <div id="panelDashboard" class="panel active">
        <div class="stats-grid" id="statsGrid"></div>
        <div class="charts-row">
            <div class="chart-container"><h3>📊 Ticket Status Distribution</h3><canvas id="ticketChart"></canvas></div>
            <div class="chart-container"><h3>📈 Monthly Trend</h3><canvas id="trendChart"></canvas></div>
        </div>
        <div class="form-card">
            <h3>📋 Recent Tickets</h3>
            <div id="recentTickets"></div>
        </div>
    </div>

    <!-- Tickets Panel -->
    <div id="panelTickets" class="panel">
        <div class="ticket-grid" id="ticketGrid"></div>
    </div>

    <!-- Create Ticket Panel -->
    <div id="panelCreate" class="panel">
        <div class="form-card">
            <h3>🚨 Create Incident Ticket</h3>
            <div class="form-row">
                <div class="form-group"><label>Site Name</label><input type="text" id="ticketSite" placeholder="Enter site name"></div>
                <div class="form-group"><label>Incident Date</label><input type="datetime-local" id="ticketDate"></div>
            </div>
            <div class="form-group"><label>Description</label><textarea id="ticketDesc" rows="3" placeholder="Describe the issue..."></textarea></div>
            <div class="form-row">
                <div class="form-group"><label>Team</label><select id="ticketTeam">
                    <option>Transmission Team</option><option>Core Network Team</option><option>Power Team</option>
                    <option>Call Center</option><option>OCS Team</option><option>IPRAN Team</option><option>DATACOM Team</option>
                </select></div>
                <div class="form-group"><label>Priority</label><select id="ticketPriority"><option>Critical</option><option>High</option><option>Medium</option><option>Low</option></select></div>
            </div>
            <button class="btn-primary" onclick="createTicket()" style="width:100%">✅ Create Ticket</button>
        </div>
    </div>

    <!-- Change Request Panel -->
    <div id="panelChangeRequest" class="panel">
        <div class="form-card">
            <h3>📝 Submit Change Request</h3>
            <div class="form-row">
                <div class="form-group"><label>Change Title</label><input type="text" id="crTitle" placeholder="e.g., Router Upgrade"></div>
                <div class="form-group"><label>Request Date</label><input type="date" id="crDate"></div>
            </div>
            <div class="form-group"><label>Description</label><textarea id="crDesc" rows="3" placeholder="Describe the change..."></textarea></div>
            <div class="form-row">
                <div class="form-group"><label>Impact Assessment</label><select id="crImpact"><option>Low</option><option>Medium</option><option>High</option><option>Critical</option></select></div>
                <div class="form-group"><label>Proposed By</label><input type="text" id="crProposedBy" placeholder="Your name"></div>
            </div>
            <button class="btn-primary" onclick="submitChangeRequest()" style="width:100%">📤 Submit for Approval</button>
        </div>
        <div class="form-card">
            <h3>📋 Pending Change Requests</h3>
            <div id="changeRequestsList"></div>
        </div>
    </div>

    <!-- Reports Panel -->
    <div id="panelReports" class="panel">
        <div class="form-card">
            <h3>📊 Generate Reports</h3>
            <div class="form-row">
                <div class="form-group"><label>From Date</label><input type="date" id="reportFrom"></div>
                <div class="form-group"><label>To Date</label><input type="date" id="reportTo"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Team</label><select id="reportTeam">
                    <option value="">All Teams</option>
                    <option>Transmission Team</option><option>Core Network Team</option><option>Power Team</option>
                    <option>Call Center</option><option>OCS Team</option><option>IPRAN Team</option><option>DATACOM Team</option>
                </select></div>
                <div class="form-group"><label>Status</label><select id="reportStatus"><option value="">All</option><option>OPEN</option><option>RESOLVED</option><option>CLOSED</option></select></div>
            </div>
            <div style="display:flex; gap:12px; margin-top:20px;">
                <button class="btn-primary" onclick="exportShiftReport()">📊 Export Shift Report (Excel)</button>
                <button class="btn-success" onclick="exportAllTickets()">📋 Export All Tickets (Excel)</button>
            </div>
        </div>
        <div id="reportPreview"></div>
    </div>
</div>

<!-- Approval Modal -->
<div id="approvalModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--accent); margin-bottom:20px;">Approve Change Request</h2>
        <p id="approvalDetails"></p>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-success" onclick="approveRequest(true)">✅ Approve</button>
            <button class="btn-warning" onclick="approveRequest(false)">❌ Reject</button>
            <button class="btn-primary" onclick="closeApprovalModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    // ============= DATA =============
    let tickets = [];
    let changeRequests = [];
    let currentUser = null;
    let pendingApprovalId = null;
    let ticketChart = null;
    let trendChart = null;

    // Load initial data
    function loadData() {
        const savedTickets = localStorage.getItem('comium_tickets');
        const savedChangeRequests = localStorage.getItem('comium_changes');
        
        if (savedTickets) {
            tickets = JSON.parse(savedTickets);
        } else {
            // Sample tickets
            tickets = [
                { id: "INC-001", site: "Old Yundum 4", createdAt: new Date().toISOString(), description: "Power failure detected", team: "Power Team", priority: "Critical", status: "OPEN" },
                { id: "INC-002", site: "Latriya", createdAt: new Date(Date.now() - 2*24*60*60*1000).toISOString(), description: "Transmission link down", team: "Transmission Team", priority: "High", status: "RESOLVED" },
                { id: "INC-003", site: "Brufut", createdAt: new Date(Date.now() - 5*24*60*60*1000).toISOString(), description: "High CPU usage", team: "Core Network Team", priority: "Medium", status: "CLOSED" },
                { id: "INC-004", site: "Sukuta", createdAt: new Date(Date.now() - 1*24*60*60*1000).toISOString(), description: "No internet connectivity", team: "IPRAN Team", priority: "High", status: "OPEN" },
                { id: "INC-005", site: "Banjul", createdAt: new Date(Date.now() - 3*24*60*60*1000).toISOString(), description: "Billing system error", team: "OCS Team", priority: "Critical", status: "RESOLVED" }
            ];
            saveData();
        }
        
        if (savedChangeRequests) {
            changeRequests = JSON.parse(savedChangeRequests);
        } else {
            changeRequests = [];
            saveChanges();
        }
    }
    
    function saveData() {
        localStorage.setItem('comium_tickets', JSON.stringify(tickets));
    }
    
    function saveChanges() {
        localStorage.setItem('comium_changes', JSON.stringify(changeRequests));
    }
    
    function generateTicketId() {
        return "INC-" + new Date().getFullYear() + String(new Date().getMonth()+1).padStart(2,'0') + String(new Date().getDate()).padStart(2,'0') + "-" + String(tickets.length + 1).padStart(4,'0');
    }
    
    function createTicket() {
        const site = document.getElementById('ticketSite').value;
        const date = document.getElementById('ticketDate').value;
        const desc = document.getElementById('ticketDesc').value;
        const team = document.getElementById('ticketTeam').value;
        const priority = document.getElementById('ticketPriority').value;
        
        if (!site || !desc) { alert('Please fill required fields'); return; }
        
        const newTicket = {
            id: generateTicketId(),
            site: site,
            createdAt: new Date().toISOString(),
            occurredAt: date || new Date().toISOString(),
            description: desc,
            team: team,
            priority: priority,
            status: 'OPEN'
        };
        
        tickets.unshift(newTicket);
        saveData();
        renderDashboard();
        renderTickets();
        showPanel('dashboard');
        alert(`✅ Ticket ${newTicket.id} created!`);
        
        document.getElementById('ticketSite').value = '';
        document.getElementById('ticketDesc').value = '';
    }
    
    function updateTicketStatus(id, newStatus) {
        const ticket = tickets.find(t => t.id === id);
        if (ticket) {
            ticket.status = newStatus;
            saveData();
            renderDashboard();
            renderTickets();
            alert(`✅ Ticket ${id} updated to ${newStatus}`);
        }
    }
    
    function submitChangeRequest() {
        const title = document.getElementById('crTitle').value;
        const date = document.getElementById('crDate').value;
        const desc = document.getElementById('crDesc').value;
        const impact = document.getElementById('crImpact').value;
        const proposedBy = document.getElementById('crProposedBy').value;
        
        if (!title || !desc || !proposedBy) { alert('Please fill all fields'); return; }
        
        const newRequest = {
            id: "CR-" + Date.now(),
            title: title,
            date: date || new Date().toISOString().slice(0,10),
            description: desc,
            impact: impact,
            proposedBy: proposedBy,
            status: 'PENDING',
            createdAt: new Date().toISOString()
        };
        
        changeRequests.unshift(newRequest);
        saveChanges();
        renderChangeRequests();
        alert(`✅ Change Request "${title}" submitted for approval!`);
        
        document.getElementById('crTitle').value = '';
        document.getElementById('crDesc').value = '';
        document.getElementById('crProposedBy').value = '';
    }
    
    function openApproval(id) {
        pendingApprovalId = id;
        const req = changeRequests.find(r => r.id === id);
        if (req) {
            document.getElementById('approvalDetails').innerHTML = `
                <strong>Title:</strong> ${req.title}<br>
                <strong>Proposed By:</strong> ${req.proposedBy}<br>
                <strong>Impact:</strong> ${req.impact}<br>
                <strong>Description:</strong> ${req.description}
            `;
            document.getElementById('approvalModal').style.display = 'flex';
        }
    }
    
    function approveRequest(isApproved) {
        const req = changeRequests.find(r => r.id === pendingApprovalId);
        if (req) {
            req.status = isApproved ? 'APPROVED' : 'REJECTED';
            saveChanges();
            renderChangeRequests();
            alert(`Change Request ${isApproved ? 'APPROVED' : 'REJECTED'}!`);
        }
        closeApprovalModal();
    }
    
    function closeApprovalModal() {
        document.getElementById('approvalModal').style.display = 'none';
        pendingApprovalId = null;
    }
    
    function renderChangeRequests() {
        const container = document.getElementById('changeRequestsList');
        if (!container) return;
        
        const pending = changeRequests.filter(r => r.status === 'PENDING');
        if (pending.length === 0) {
            container.innerHTML = '<p>No pending change requests.</p>';
            return;
        }
        
        container.innerHTML = pending.map(req => `
            <div class="ticket-card" style="margin-bottom:15px;">
                <div class="ticket-header">
                    <span class="ticket-id">${req.id}</span>
                    <span class="ticket-status" style="background:#fef3c7; color:#d97706;">PENDING</span>
                </div>
                <div><strong>${req.title}</strong></div>
                <div>📅 ${req.date} | 👤 ${req.proposedBy} | ⚡ Impact: ${req.impact}</div>
                <div>📝 ${req.description}</div>
                <div class="ticket-actions">
                    <button class="btn-primary" onclick="openApproval('${req.id}')">📋 Review & Approve</button>
                </div>
            </div>
        `).join('');
    }
    
    function renderDashboard() {
        const stats = {
            total: tickets.length,
            open: tickets.filter(t => t.status === 'OPEN').length,
            resolved: tickets.filter(t => t.status === 'RESOLVED').length,
            closed: tickets.filter(t => t.status === 'CLOSED').length
        };
        
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><h4>Total Tickets</h4><div class="stat-number">${stats.total}</div></div>
            <div class="stat-card"><h4>Open</h4><div class="stat-number">${stats.open}</div></div>
            <div class="stat-card"><h4>Resolved</h4><div class="stat-number">${stats.resolved}</div></div>
            <div class="stat-card"><h4>Closed</h4><div class="stat-number">${stats.closed}</div></div>
        `;
        
        // Chart
        const ctx = document.getElementById('ticketChart')?.getContext('2d');
        if (ctx) {
            if (ticketChart) ticketChart.destroy();
            ticketChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Open', 'Resolved', 'Closed'],
                    datasets: [{ data: [stats.open, stats.resolved, stats.closed], backgroundColor: ['#dc2626', '#10b981', '#6b7280'] }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: getComputedStyle(document.body).getPropertyValue('--text-primary') } } } }
            });
        }
        
        // Trend Chart (last 7 days)
        const last7Days = [];
        for (let i = 6; i >= 0; i--) {
            const date = new Date();
            date.setDate(date.getDate() - i);
            last7Days.push(date.toLocaleDateString());
        }
        
        const createdCount = last7Days.map(day => {
            return tickets.filter(t => new Date(t.createdAt).toLocaleDateString() === day).length;
        });
        
        const ctx2 = document.getElementById('trendChart')?.getContext('2d');
        if (ctx2) {
            if (trendChart) trendChart.destroy();
            trendChart = new Chart(ctx2, {
                type: 'line',
                data: { labels: last7Days, datasets: [{ label: 'Tickets Created', data: createdCount, borderColor: '#dc2626', fill: false }] },
                options: { responsive: true }
            });
        }
        
        // Recent tickets
        const recent = tickets.slice(0, 5);
        document.getElementById('recentTickets').innerHTML = recent.map(t => `
            <div style="padding:12px; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between;">
                <span><strong>${t.id}</strong> - ${t.site}</span>
                <span class="ticket-status status-${t.status}">${t.status}</span>
            </div>
        `).join('');
    }
    
    function renderTickets() {
        const container = document.getElementById('ticketGrid');
        if (!container) return;
        
        container.innerHTML = tickets.map(ticket => `
            <div class="ticket-card">
                <div class="ticket-header">
                    <span class="ticket-id">${ticket.id}</span>
                    <span class="ticket-status status-${ticket.status}">${ticket.status}</span>
                </div>
                <div><strong>📍 ${ticket.site}</strong> | ⚡ ${ticket.priority}</div>
                <div>👤 Team: ${ticket.team}</div>
                <div>📅 ${new Date(ticket.createdAt).toLocaleString()}</div>
                <div>📝 ${ticket.description.substring(0, 60)}</div>
                <div class="ticket-actions">
                    ${ticket.status === 'OPEN' ? `<button class="btn-primary" onclick="updateTicketStatus('${ticket.id}','RESOLVED')">✅ Resolve</button>` : ''}
                    ${ticket.status === 'RESOLVED' ? `<button class="btn-success" onclick="updateTicketStatus('${ticket.id}','CLOSED')">🔒 Close</button>` : ''}
                    ${ticket.status === 'RESOLVED' ? `<button class="btn-warning" onclick="updateTicketStatus('${ticket.id}','OPEN')">🔄 Reopen</button>` : ''}
                </div>
            </div>
        `).join('');
    }
    
    function exportShiftReport() {
        const fromDate = document.getElementById('reportFrom').value;
        const toDate = document.getElementById('reportTo').value;
        const team = document.getElementById('reportTeam').value;
        const status = document.getElementById('reportStatus').value;
        
        let filtered = [...tickets];
        if (fromDate) filtered = filtered.filter(t => new Date(t.createdAt) >= new Date(fromDate));
        if (toDate) filtered = filtered.filter(t => new Date(t.createdAt) <= new Date(toDate));
        if (team) filtered = filtered.filter(t => t.team === team);
        if (status) filtered = filtered.filter(t => t.status === status);
        
        const stats = {
            total: filtered.length,
            open: filtered.filter(t => t.status === 'OPEN').length,
            resolved: filtered.filter(t => t.status === 'RESOLVED').length,
            closed: filtered.filter(t => t.status === 'CLOSED').length
        };
        
        const reportData = [
            { Metric: "Shift Report Date", Value: new Date().toLocaleString() },
            { Metric: "Total Tickets", Value: stats.total },
            { Metric: "Open Tickets", Value: stats.open },
            { Metric: "Resolved Tickets", Value: stats.resolved },
            { Metric: "Closed Tickets", Value: stats.closed },
            { Metric: "", Value: "" },
            { Metric: "Ticket ID", Value: "Site" },
            ...filtered.map(t => ({ Metric: t.id, Value: `${t.site} - ${t.status}` }))
        ];
        
        const ws = XLSX.utils.json_to_sheet(reportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Shift Report');
        XLSX.writeFile(wb, `Shift_Report_${new Date().toISOString().slice(0,19)}.xlsx`);
        alert('Shift report exported to Excel!');
    }
    
    function exportAllTickets() {
        const exportData = tickets.map(t => ({
            'Ticket ID': t.id,
            'Site': t.site,
            'Created At': new Date(t.createdAt).toLocaleString(),
            'Description': t.description,
            'Team': t.team,
            'Priority': t.priority,
            'Status': t.status
        }));
        
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'All Tickets');
        XLSX.writeFile(wb, `All_Tickets_${new Date().toISOString().slice(0,19)}.xlsx`);
        alert('All tickets exported to Excel!');
    }
    
    function showPanel(panelName) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        
        document.getElementById(`panel${panelName.charAt(0).toUpperCase() + panelName.slice(1)}`).classList.add('active');
        if (event && event.target) event.target.classList.add('active');
        
        if (panelName === 'dashboard') renderDashboard();
        if (panelName === 'tickets') renderTickets();
        if (panelName === 'changeRequest') renderChangeRequests();
        if (panelName === 'create') document.getElementById('ticketDate').value = new Date().toISOString().slice(0,16);
    }
    
    function toggleTheme() {
        if (document.body.classList.contains('light')) {
            document.body.classList.remove('light');
            localStorage.setItem('theme', 'dark');
        } else {
            document.body.classList.add('light');
            localStorage.setItem('theme', 'light');
        }
        renderDashboard(); // Refresh charts with new colors
    }
    
    function login() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (email === 'admin@comium.com' && password === 'admin123') {
            currentUser = { email: email, name: 'Admin', role: 'NOC Manager' };
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('userDisplay').innerHTML = `👤 Admin (NOC Manager)`;
            loadData();
            renderDashboard();
            renderTickets();
            renderChangeRequests();
        } else {
            const errorDiv = document.getElementById('loginError');
            errorDiv.innerHTML = '❌ Invalid credentials. Use: admin@comium.com / admin123';
            errorDiv.style.display = 'block';
            setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
        }
    }
    
    function logout() {
        currentUser = null;
        document.getElementById('loginContainer').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('loginEmail').value = 'admin@comium.com';
        document.getElementById('loginPassword').value = 'admin123';
    }
    
    // Load saved theme
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') document.body.classList.add('light');
    
    loadData();
</script>
</body>
</html>
