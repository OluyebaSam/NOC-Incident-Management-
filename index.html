<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comium NOC - Working Version</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            text-align: center;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .status { 
            display: inline-block; 
            width: 10px; 
            height: 10px; 
            border-radius: 50%; 
            margin-right: 8px;
        }
        .status-online { background-color: #10b981; }
        .status-offline { background-color: #ef4444; }
        .dashboard { display: none; }
        .card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            margin: 15px 0;
            text-align: left;
        }
        .ticket-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #c0392b;
        }
    </style>
</head>
<body>

<!-- LOGIN FORM -->
<div id="loginContainer" class="container">
    <h1>🔴 Comium NOC</h1>
    <p>Operations & Incident Management</p>
    <div style="margin: 15px 0;">
        <span id="statusDot" class="status status-offline"></span>
        <span id="statusText">Checking connection...</span>
    </div>
    <input type="text" id="email" placeholder="Email" value="admin@comium.com">
    <input type="password" id="password" placeholder="Password" value="admin123">
    <button onclick="login()">Login</button>
    <div id="loginError" class="error" style="margin-top: 15px;"></div>
</div>

<!-- DASHBOARD (hidden until login) -->
<div id="dashboard" style="display: none;">
    <div class="container" style="width: 800px; max-width: 100%;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>🔴 Comium NOC Dashboard</h1>
            <button onclick="logout()" style="width: auto; padding: 8px 20px;">Logout</button>
        </div>
        <div id="userInfo" class="card" style="background: #c0392b; color: white;">
            Welcome, <span id="userName"></span>!
        </div>
        
        <div class="card">
            <h3>📊 Quick Stats</h3>
            <div id="stats" style="display: flex; gap: 15px; justify-content: space-around; margin-top: 15px;">
                <div><strong id="totalTickets">0</strong><br>Total Tickets</div>
                <div><strong id="openTickets">0</strong><br>Open Tickets</div>
                <div><strong id="closedTickets">0</strong><br>Closed Tickets</div>
            </div>
        </div>
        
        <div class="card">
            <h3>➕ Create New Ticket</h3>
            <input type="text" id="newTicketSite" placeholder="Site Name" style="width: calc(33% - 5px); display: inline-block; margin-right: 5px;">
            <input type="text" id="newTicketDesc" placeholder="Description" style="width: calc(50% - 5px); display: inline-block;">
            <select id="newTicketStatus" style="width: calc(15% - 5px); display: inline-block; padding: 14px;">
                <option>Open</option><option>Assigned</option><option>Handling</option><option>Processed</option><option>Closed</option>
            </select>
            <button onclick="createTicket()" style="margin-top: 10px;">Create Ticket</button>
        </div>
        
        <div class="card">
            <h3>🎫 My Tickets</h3>
            <div id="ticketsList">Loading tickets...</div>
        </div>
    </div>
</div>

<script>
    // YOUR WORKING CREDENTIALS
    const SUPABASE_URL = 'https://sytichlbyvsacrppukrm.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_j57-kq4_T_Wn-IcRodyUEA_M8XZMiMx';
    
    let supabase;
    let currentUser = null;
    let allTickets = [];

    async function init() {
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // Test connection
            const { data, error } = await supabase.from('staffs').select('count', { count: 'exact', head: true });
            if (error) throw error;
            
            document.getElementById('statusDot').className = 'status status-online';
            document.getElementById('statusText').innerHTML = 'Supabase Connected ✅';
            document.getElementById('statusText').style.color = '#10b981';
            console.log('Connected to Supabase!');
            return true;
        } catch(e) {
            document.getElementById('statusDot').className = 'status status-offline';
            document.getElementById('statusText').innerHTML = 'Connection Failed: ' + e.message;
            document.getElementById('statusText').style.color = '#ef4444';
            console.error('Connection error:', e);
            return false;
        }
    }

    async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        // Fetch staffs
        const { data: staffs, error } = await supabase.from('staffs').select('*');
        if (error) {
            document.getElementById('loginError').innerText = 'Database error: ' + error.message;
            return;
        }
        
        const user = staffs.find(s => s.email === email && s.password === password);
        
        if (user) {
            currentUser = user;
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('userName').innerText = user.name + (user.is_admin ? ' (Admin)' : '');
            await loadTickets();
        } else {
            document.getElementById('loginError').innerText = 'Invalid email or password';
        }
    }

    function logout() {
        currentUser = null;
        document.getElementById('loginContainer').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('email').value = 'admin@comium.com';
        document.getElementById('password').value = 'admin123';
    }

    async function loadTickets() {
        const { data, error } = await supabase.from('tickets').select('*').order('created_at', { ascending: false });
        if (error) {
            console.error('Error loading tickets:', error);
            return;
        }
        allTickets = data || [];
        updateDisplay();
    }

    function updateDisplay() {
        // Update stats
        document.getElementById('totalTickets').innerText = allTickets.length;
        document.getElementById('openTickets').innerText = allTickets.filter(t => t.status !== 'Closed').length;
        document.getElementById('closedTickets').innerText = allTickets.filter(t => t.status === 'Closed').length;
        
        // Update tickets list
        const ticketsDiv = document.getElementById('ticketsList');
        if (allTickets.length === 0) {
            ticketsDiv.innerHTML = '<div class="ticket-item">No tickets found. Create one above!</div>';
        } else {
            ticketsDiv.innerHTML = allTickets.map(t => `
                <div class="ticket-item">
                    <strong>${t.id}</strong> - ${t.site_name || t.site || 'No site'} - Status: ${t.status}
                    <br><small>${t.description || 'No description'}</small>
                </div>
            `).join('');
        }
    }

    async function createTicket() {
        const site = document.getElementById('newTicketSite').value;
        const desc = document.getElementById('newTicketDesc').value;
        const status = document.getElementById('newTicketStatus').value;
        
        if (!site || !desc) {
            alert('Please fill in Site and Description');
            return;
        }
        
        const newTicket = {
            id: 'TT' + Date.now(),
            site_name: site,
            description: desc,
            status: status,
            priority: 'Medium',
            team: 'General',
            created_by: currentUser.email,
            created_at: new Date().toISOString(),
            updated_at: new Date().toISOString()
        };
        
        const { error } = await supabase.from('tickets').insert([newTicket]);
        if (error) {
            alert('Error creating ticket: ' + error.message);
        } else {
            alert('Ticket created successfully!');
            document.getElementById('newTicketSite').value = '';
            document.getElementById('newTicketDesc').value = '';
            await loadTickets();
        }
    }

    // Start the app
    init();
</script>
</body>
</html>
